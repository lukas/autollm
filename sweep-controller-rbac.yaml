apiVersion: v1
kind: ServiceAccount
metadata:
  name: autollm-controller
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: autollm-controller
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "create", "delete", "patch", "update"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: autollm-controller
subjects:
  - kind: ServiceAccount
    name: autollm-controller
roleRef:
  kind: Role
  name: autollm-controller
  apiGroup: rbac.authorization.k8s.io
